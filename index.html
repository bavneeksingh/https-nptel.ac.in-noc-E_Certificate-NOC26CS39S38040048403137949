<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="viewer-container">
    <img src="certificate.jpg" alt="Certificate" id="certificate-img">
  </div>

  <div class="controls">
    <button class="control-btn" id="zoom-out" title="Zoom Out">−</button>
    <button class="control-btn" id="reset" title="Reset Zoom">⟲</button>
    <button class="control-btn" id="zoom-in" title="Zoom In">+</button>
  </div>

  <div class="zoom-info" id="zoom-level">100%</div>

  <script src="main.js"></script>
</body>
</html>
